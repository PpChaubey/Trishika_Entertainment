version: "3.9"

services:

  # ─── NGINX REVERSE PROXY ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine          # ✅ pinned version
    ports:
      - "80:80"
      - "443:443"                     # ✅ HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro   # ✅ SSL certs
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      app:   { condition: service_healthy }
      audio: { condition: service_healthy }
      image: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:                       # ✅ healthcheck
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── CERTBOT (HTTPS / Let's Encrypt) ──────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done;"

  # ─── REDIS (distributed rate limiting) ────────────────────
  redis:
    image: redis:7-alpine             # ✅ pinned version
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── MAIN NODE.JS APP ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file: .env                    # ✅ use .env file directly
    environment:
      - PORT=3000
      - OLLAMA_URL=http://ollama:11434/api/chat
      - REDIS_URL=redis://redis:6379
    depends_on:
      ollama: { condition: service_started }
      redis:  { condition: service_healthy }
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:                      # ✅ healthcheck
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── AUDIO SERVER ─────────────────────────────────────────
  audio:
    build:
      context: .
      dockerfile: Dockerfile.audio
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
    expose:
      - "3001"
    healthcheck:                      # ✅ healthcheck
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/audio/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── IMAGE SERVER ─────────────────────────────────────────
  image:
    build:
      context: .
      dockerfile: Dockerfile.image
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
    expose:
      - "3002"
    deploy:
      resources:
        limits:
          memory: 6G
    healthcheck:                      # ✅ healthcheck
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/image/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── OLLAMA ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:11434"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
