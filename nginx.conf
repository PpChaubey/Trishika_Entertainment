events { worker_connections 1024; }

http {
  # ─── RATE LIMIT ZONES ──────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m    rate=20r/m;
  limit_req_zone $binary_remote_addr zone=story:10m  rate=10r/m;
  limit_req_zone $binary_remote_addr zone=media:10m  rate=15r/m;

  # ─── LOGGING (JSON structured) ─────────────────────────
  log_format json_log escape=json
    '{'
      '"time":"$time_iso8601",'
      '"ip":"$remote_addr",'
      '"method":"$request_method",'
      '"path":"$request_uri",'
      '"status":$status,'
      '"bytes":$body_bytes_sent,'
      '"duration":$request_time,'
      '"ua":"$http_user_agent"'
    '}';
  access_log /var/log/nginx/access.log json_log;
  error_log  /var/log/nginx/error.log warn;

  # ─── HTTP → HTTPS REDIRECT ─────────────────────────────
  server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS SERVER ──────────────────────────────────────
  server {
    listen 443 ssl;
    server_name _;                    # replace with your domain

    # ✅ SSL — Let's Encrypt certs
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ✅ CORS locked to your domain (not *)
    set $cors_origin "https://yourdomain.com";

    # Security headers
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header X-XSS-Protection       "1; mode=block"   always;
    add_header Referrer-Policy        "no-referrer"     always;

    # ─── MAIN APP ────────────────────────────────────────
    location / {
      proxy_pass         http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection keep-alive;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      limit_req          zone=api burst=5 nodelay;
    }

    # ─── STORY API ───────────────────────────────────────
    location /api/story {
      proxy_pass         http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 140s;
      limit_req          zone=story burst=3 nodelay;

      add_header Access-Control-Allow-Origin  $cors_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # ─── AUDIO (internal, token injected here) ───────────
    location /internal/audio/ {
      proxy_pass         http://audio:3001/audio/;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Service-Token $SERVICE_TOKEN;  # injected server-side
      limit_req          zone=media burst=10 nodelay;

      add_header Access-Control-Allow-Origin  $cors_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # ─── IMAGE (internal, token injected here) ───────────
    location /internal/image/ {
      proxy_pass         http://image:3002/image/;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Service-Token $SERVICE_TOKEN;  # injected server-side
      proxy_read_timeout 300s;
      limit_req          zone=media burst=3 nodelay;

      add_header Access-Control-Allow-Origin  $cors_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # ─── BLOCK DIRECT SERVICE ACCESS ─────────────────────
    location ~ ^/(audio|image)/ { return 403; }
  }
}
